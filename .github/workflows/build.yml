name: Build from ios_source
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract ios_source
        run: |
          # Creates a folder and unpacks your specific tar.gz file
          mkdir -p source_data
          tar -xzvf "ios_source.tar.gz" -C source_data

      - name: Auto-Detect and Build
        run: |
          # 1. Find the project wherever it is inside the archive
          PROJECT_PATH=$(find source_data -name "*.xcodeproj" | head -n 1)
          echo "Found Project: $PROJECT_PATH"
          
          # 2. Get the scheme automatically to avoid "Code 1" errors
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_PATH" -json | python3 -c "import sys, json; print(json.load(sys.stdin)['project']['schemes'])" 2>/dev/null | head -n 1 || echo "Crash 5 TTMABE")
          echo "Using Scheme: $SCHEME_NAME"

          # 3. Build Archive (Unsigned for iPad)
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath $PWD/build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r Crash5_Built.ipa Payload

      - name: Upload to iPad
        uses: actions/upload-artifact@v4
        with:
          name: Final-IPA
          path: build/Crash5_Built.ipa
