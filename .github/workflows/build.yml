name: iPad Brute Force Build
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ios_source
        run: |
          # Force unpack everything into a clean folder
          mkdir -p build_source
          tar -xzvf "ios_source.tar.gz" -C build_source
          
      - name: Auto-Detect and Fix Project
        run: |
          # 1. Find the project wherever it is
          PROJECT_PATH=$(find build_source -name "*.xcodeproj" | head -n 1)
          echo "Found Project at: $PROJECT_PATH"
          
          # 2. Get the real Scheme name (this fixes code 74/65 errors)
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_PATH" -json | python3 -c "import sys, json; print(json.load(sys.stdin)['project']['schemes'][0])")
          echo "Using Scheme: $SCHEME_NAME"
          
          # 3. The Build - Adding 'clean' to fix error 74
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath $PWD/build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r BuiltApp.ipa Payload

      - name: Upload to iPad
        uses: actions/upload-artifact@v4
        with:
          name: Final-IPA
          path: build/BuiltApp.ipa
