name: Build Crash 5 TTMABE
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unpack GZ
        run: |
          # Unpacks the file regardless of its internal folder structure
          tar -xzf "Crash 5 TTMABE.gz" || tar -xzf "Crash 5 TTMABE.tar.gz" || gunzip -c "Crash 5 TTMABE.gz" > source_code

      - name: Auto-Detect and Archive
        run: |
          # Finds the project file automatically so "Archive Failed" stops happening
          PROJECT_PATH=$(find . -name "*.xcodeproj" -o -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_PATH" -json | python3 -c "import sys, json; print(json.load(sys.stdin)['project']['schemes'][0])" 2>/dev/null || echo "Crash 5 TTMABE")

          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath $PWD/build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Finalize IPA
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r Crash5.ipa Payload

      - name: Upload to iPad
        uses: actions/upload-artifact@v4
        with:
          name: Crash5-IPA
          path: build/Crash5.ipa
