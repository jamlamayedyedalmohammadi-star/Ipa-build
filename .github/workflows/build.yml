name: Unpack tar.gz and Build
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract Source Code
        run: |
          # Extracts the tar.gz and creates a folder for it
          mkdir -p extracted_source
          tar -xzf "Crash 5 TTMABE.tar.gz" -C extracted_source

      - name: Auto-Detect Project and Build
        run: |
          # Searches for the .xcodeproj file anywhere in the extracted folder
          PROJECT_PATH=$(find extracted_source -name "*.xcodeproj" | head -n 1)
          
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "Crash 5 TTMABE" \
            -archivePath $PWD/build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Finalize IPA
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r Crash5.ipa Payload

      - name: Upload to iPad
        uses: actions/upload-artifact@v4
        with:
          name: Final-IPA
          path: build/Crash5.ipa
