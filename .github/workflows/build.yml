name: Fix Code 74 and Build
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and Move to Root
        run: |
          # 1. Extract everything
          mkdir -p temp_unpack
          tar -xzf *.tar.gz -C temp_unpack
          
          # 2. Move everything from the subfolder to the root so Xcode doesn't get lost
          cp -R temp_unpack/*/. . || cp -R temp_unpack/. .
          
      - name: Build with Auto-Scheme
        run: |
          # 1. Find the project file
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          echo "Using Project: $PROJECT_PATH"
          
          # 2. Automatically find the FIRST scheme so we don't guess the name
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_PATH" -json | python3 -c "import sys, json; print(json.load(sys.stdin)['project']['schemes'][0])")
          echo "Using Scheme: $SCHEME_NAME"
          
          # 3. The Build
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath $PWD/build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r FinalApp.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Fixed-Crash5-IPA
          path: build/FinalApp.ipa
