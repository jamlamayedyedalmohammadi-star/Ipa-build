name: Debug and Build Crash 5
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: List Files (Debug)
        run: |
          echo "Checking for your file..."
          ls -R # This shows us every file in the logs if it fails again

      - name: Auto-Extract Any tar.gz
        run: |
          # This finds the first tar.gz file it can see and extracts it
          FILE_NAME=$(find . -name "*.tar.gz" | head -n 1)
          echo "Found file: $FILE_NAME"
          mkdir -p extracted_source
          tar -xzf "$FILE_NAME" -C extracted_source

      - name: Find Project and Build
        run: |
          # This finds the .xcodeproj wherever it is inside the extracted folder
          PROJECT_PATH=$(find extracted_source -name "*.xcodeproj" | head -n 1)
          echo "Building project at: $PROJECT_PATH"
          
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "Crash 5 TTMABE" \
            -archivePath $PWD/build/App.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create and Upload IPA
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r Crash5.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Final-IPA
          path: build/Crash5.ipa
